[build]
builder = "NIXPACKS"

[deploy]
startCommand = "(alembic upgrade head || echo 'Migration failed, continuing...') && export SKIP_SLOW_SYNC=true && (python -m app.seed_assets || echo 'Seeding failed, continuing...') && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckTimeout = 300
