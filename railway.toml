[build]
builder = "NIXPACKS"

[deploy]
# Temporarily add 'alembic stamp d6eecacb1b7f' to recover from unknown revision '00a056e05e09' in production DB.
# This forces the DB to acknowledge the current code state.
startCommand = "SKIP_SLOW_SYNC=true alembic stamp d6eecacb1b7f && alembic upgrade head && python -m app.seed_assets && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckTimeout = 300
