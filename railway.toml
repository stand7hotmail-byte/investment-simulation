[build]
builder = "NIXPACKS"

[deploy]
# Back to normal mode now that the DB inconsistency is resolved.
startCommand = "SKIP_SLOW_SYNC=true alembic upgrade head && python -m app.seed_assets && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckTimeout = 300
